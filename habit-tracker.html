<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streaklight — Habit Tracker</title>
<style>
  :root{
    --bg: #0B0F1A;
    --panel: #12182B;
    --panel-edge: #1E2740;
    --cyan: #4CF5D6;
    --magenta: #F5478C;
    --text: #E7ECF7;
    --text-dim: #7B87A8;
    --ok: #4CF5D6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: radial-gradient(circle at 20% -10%, #1a2340 0%, var(--bg) 55%);
    color:var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height:100vh;
    padding:32px 16px 80px;
  }
  .wrap{max-width:720px; margin:0 auto;}
  header{margin-bottom:28px;}
  .eyebrow{
    font-family:'Courier New', monospace;
    letter-spacing:3px;
    font-size:11px;
    color:var(--magenta);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  h1{
    font-size:32px;
    margin:0 0 6px;
    font-weight:700;
    background:linear-gradient(90deg, var(--cyan), var(--magenta));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    letter-spacing:-0.5px;
  }
  .sub{color:var(--text-dim); font-size:14px;}

  .add-row{
    display:flex; gap:10px; margin:24px 0 28px;
  }
  input[type=text]{
    flex:1;
    background:var(--panel);
    border:1px solid var(--panel-edge);
    border-radius:10px;
    padding:12px 14px;
    color:var(--text);
    font-size:14px;
    outline:none;
    transition:border-color .15s;
  }
  input[type=text]:focus{border-color:var(--cyan);}
  button{
    font-family:inherit;
    cursor:pointer;
    border:none;
    border-radius:10px;
    font-weight:600;
    transition:transform .1s, box-shadow .15s;
  }
  button:active{transform:scale(0.96);}
  .add-btn{
    background:linear-gradient(90deg, var(--cyan), var(--magenta));
    color:#0B0F1A;
    padding:0 20px;
    font-size:14px;
  }
  .add-btn:hover{box-shadow:0 0 20px rgba(76,245,214,0.35);}

  .habit{
    background:var(--panel);
    border:1px solid var(--panel-edge);
    border-radius:14px;
    padding:18px 20px;
    margin-bottom:14px;
  }
  .habit-top{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;
  }
  .habit-name{font-size:16px; font-weight:600;}
  .streak{
    font-family:'Courier New', monospace;
    font-size:13px;
    color:var(--text-dim);
    display:flex; align-items:center; gap:6px;
  }
  .streak.active{color:var(--cyan); text-shadow:0 0 12px rgba(76,245,214,0.6);}
  .flame{font-size:14px;}

  .days{display:flex; gap:6px; flex-wrap:wrap;}
  .day{
    width:32px; height:32px;
    border-radius:8px;
    background:#1A2138;
    border:1px solid var(--panel-edge);
    display:flex; align-items:center; justify-content:center;
    font-size:10px; color:var(--text-dim);
    cursor:pointer;
    position:relative;
    transition:all .15s;
  }
  .day:hover{border-color:var(--cyan);}
  .day.today{border-color:var(--magenta); border-width:1.5px;}
  .day.done{
    background:linear-gradient(135deg, var(--cyan), var(--magenta));
    color:#0B0F1A;
    font-weight:700;
    box-shadow:0 0 14px rgba(76,245,214,0.45);
  }

  .del-btn{
    background:none; color:var(--text-dim); font-size:12px; padding:4px 8px;
  }
  .del-btn:hover{color:var(--magenta);}

  .empty{
    text-align:center; padding:60px 20px; color:var(--text-dim);
  }
  .empty .big{font-size:36px; margin-bottom:10px;}

  footer{
    text-align:center; margin-top:36px; color:var(--text-dim); font-size:12px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Day &nbsp;/&nbsp; Streak &nbsp;/&nbsp; Light</div>
    <h1>Streaklight</h1>
    <div class="sub">Mark today. Watch the streak glow.</div>
  </header>

  <div class="add-row">
    <input type="text" id="newHabit" placeholder="Add a habit — e.g. Read 10 pages" maxlength="40">
    <button class="add-btn" onclick="addHabit()">Add</button>
  </div>

  <div id="habitList"></div>
  <div id="emptyState" class="empty" style="display:none;">
    <div class="big">✧</div>
    Nothing tracked yet. Add your first habit above.
  </div>

  <footer>Data stays on this device only.</footer>
</div>

<script>
const STORAGE_KEY = 'streaklight_habits_v1';
const DAY_COUNT = 14; // rolling window shown per habit

function loadHabits(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}
function saveHabits(habits){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
}

function todayKey(offset=0){
  const d = new Date();
  d.setDate(d.getDate() - offset);
  return d.toISOString().slice(0,10);
}

function calcStreak(doneDates){
  let streak = 0;
  for(let i=0; i<365; i++){
    const key = todayKey(i);
    if(doneDates.includes(key)){
      streak++;
    } else if(i === 0){
      continue; // today not done yet doesn't break streak from yesterday
    } else {
      break;
    }
  }
  return streak;
}

function render(){
  const habits = loadHabits();
  const list = document.getElementById('habitList');
  const empty = document.getElementById('emptyState');
  list.innerHTML = '';

  if(habits.length === 0){
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  habits.forEach((habit, hIdx) => {
    const streak = calcStreak(habit.done || []);
    const el = document.createElement('div');
    el.className = 'habit';

    let daysHtml = '';
    for(let i = DAY_COUNT - 1; i >= 0; i--){
      const key = todayKey(i);
      const isDone = (habit.done || []).includes(key);
      const isToday = i === 0;
      const label = new Date(key).getDate();
      daysHtml += `<div class="day ${isDone ? 'done':''} ${isToday ? 'today':''}" onclick="toggleDay(${hIdx}, '${key}')">${label}</div>`;
    }

    el.innerHTML = `
      <div class="habit-top">
        <div class="habit-name">${escapeHtml(habit.name)}</div>
        <div style="display:flex; align-items:center; gap:14px;">
          <div class="streak ${streak > 0 ? 'active' : ''}">
            <span class="flame">${streak > 0 ? '⚡' : '·'}</span> ${streak} day${streak === 1 ? '' : 's'}
          </div>
          <button class="del-btn" onclick="deleteHabit(${hIdx})">✕</button>
        </div>
      </div>
      <div class="days">${daysHtml}</div>
    `;
    list.appendChild(el);
  });
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function addHabit(){
  const input = document.getElementById('newHabit');
  const name = input.value.trim();
  if(!name) return;
  const habits = loadHabits();
  habits.push({ name, done: [] });
  saveHabits(habits);
  input.value = '';
  render();
}

function toggleDay(hIdx, key){
  const habits = loadHabits();
  const habit = habits[hIdx];
  const idx = habit.done.indexOf(key);
  if(idx >= 0){
    habit.done.splice(idx, 1);
  } else {
    habit.done.push(key);
  }
  saveHabits(habits);
  render();
}

function deleteHabit(hIdx){
  const habits = loadHabits();
  habits.splice(hIdx, 1);
  saveHabits(habits);
  render();
}

document.getElementById('newHabit').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') addHabit();
});

render();
</script>
</body>
</html>
